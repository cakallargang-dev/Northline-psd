/* 3D Card Effects */
.perspective-1000 {
    perspective: 1000px;
}
.card-3d-wrapper {
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
}
.card-3d-wrapper:hover {
    transform: rotateY(15deg) rotateX(5deg);
}
.card-front, .card-back {
    backface-visibility: hidden;
}
.card-back {
    transform: rotateY(180deg);
}
.flipped {
    transform: rotateY(180deg) !important;
}

/* Holographic shine */
.hologram-effect {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(0,153,255,0) 0%, rgba(0,153,255,0.1) 40%, rgba(255,255,255,0.4) 50%, rgba(0,153,255,0.1) 60%, rgba(0,153,255,0) 100%);
    background-size: 200% 200%;
    animation: shine 4s ease-in-out infinite alternate;
    pointer-events: none;
    mix-blend-mode: overlay;
}

@keyframes shine {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

#qrcode img {
    margin: auto;
    border: 4px solid #fff;
}

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // GÜVENLİK KORİDORU: Giriş yapmamışsa Login'e at!
        const userStr = localStorage.getItem('mancave_user');
        if (!userStr) {
            window.location.href = 'mancavecard.html';
            return;
        }

        try {
            const user = JSON.parse(userStr);
            
            // Ön Yüz Verileri Doldur
            document.getElementById('card-name').textContent = user.name || "Üye";
            document.getElementById('card-car').textContent = user.car || "Araç belirtilmedi";
            if(user.photoUrl && user.photoUrl.trim() !== "") {
                document.getElementById('card-photo').src = user.photoUrl;
            }

            // Kasa Verisi Doldur (Virgülle veya Nokta ile ayrıldığını varsayıyoruz, 
            // Veya satır satır basıyoruz)
            const vaultContainer = document.getElementById('vault-list');
            const vaultData = user.vault || "";
            
            if (vaultData.trim() === "") {
                vaultContainer.innerHTML = `<div class="text-center mt-4">
                    <span class="material-symbols-outlined text-[rgba(232,188,183,0.3)] text-3xl mb-2">money_off</span>
                    <p class="text-[9px] font-['Space_Grotesk'] uppercase tracking-widest text-[rgba(232,188,183,0.4)]">Katkı bilgisi bulunamadı</p>
                </div>`;
            } else {
                // Virgül ayracı ile bölüp kutulara yerleştir
                const items = vaultData.split(',');
                let html = '';
                items.forEach(i => {
                   if(i.trim().length > 0) {
                       html += `
                        <div class="bg-[#131313] border border-[#2a2a2a] p-3 border-l-2 border-l-[#ffb400]">
                            <p class="font-['Space_Grotesk'] text-[10px] text-[#e5e2e1] uppercase tracking-widest">${i.trim()}</p>
                        </div>
                       `;
                   }
                });
                vaultContainer.innerHTML = html;
            }

        } catch(e) {
            console.error("User data parse error", e);
        }
    });

    // Kart çevirme efekti
    function flipCard() {
        const card = document.getElementById('id-card');
        card.classList.toggle('flipped');
    }
</script>
