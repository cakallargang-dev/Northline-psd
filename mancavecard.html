<!DOCTYPE html>

<html class="dark" lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bosphorus Fellas | Giriş Yap</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#0099FF',
                            dark: '#007ACC',
                            glow: 'rgba(0, 153, 255, 0.4)'
                        },
                        midnight: {
                            950: '#020617',
                            900: '#0f172a',
                            800: '#1e293b'
                        }
                    },
                    fontFamily: {
                        sans: ['Space Grotesk', 'sans-serif'],
                    },
                    borderRadius: {
                        'none': '0',
                        'sm': '0.125rem',
                        DEFAULT: '4px',
                        'md': '0.375rem',
                        'lg': '0.5rem',
                        'full': '9999px',
                    },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #020617;
            color: #f8fafc;
        }
        .brand-glow {
            text-shadow: 0 0 15px rgba(0, 153, 255, 0.6);
        }
        .card-blur {
            backdrop-filter: blur(12px);
            background-color: rgba(15, 23, 42, 0.8);
        }
        .input-focus:focus {
            box-shadow: 0 0 0 2px rgba(0, 153, 255, 0.2);
            border-color: #0099FF;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f172a;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #0099FF;
            border-radius: 2px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 selection:bg-brand selection:text-white">
<!-- Background elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-brand/10 rounded-full blur-[100px] animate-pulse-slow"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-brand/5 rounded-full blur-[100px] animate-pulse-slow" style="animation-delay: 2s;"></div>
</div>
<!-- Login Container -->
<div class="w-full max-w-md z-10">
<div class="text-center mb-10 animate-float">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-lg bg-midnight-900 border border-brand/30 mb-4 shadow-[0_0_20px_rgba(0,153,255,0.15)]">
<span class="material-symbols-outlined text-brand text-4xl font-light">sailing</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-white mb-2 uppercase">Bosphorus <span class="text-brand brand-glow">Fellas</span></h1>
<p class="text-slate-400 font-light tracking-wide uppercase text-xs">Seçkinlerin Gece Kulübü &amp; Topluluğu</p>
</div>
<div class="card-blur border border-slate-800 rounded-lg p-8 shadow-2xl relative group">
<!-- Decorative corner accent -->
<div class="absolute -top-[1px] -right-[1px] w-8 h-8 border-t border-r border-brand rounded-tr-lg opacity-50"></div>
<div class="absolute -bottom-[1px] -left-[1px] w-8 h-8 border-b border-l border-brand rounded-bl-lg opacity-50"></div>
<form class="space-y-6" id="loginForm">
<div>
<label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2" for="id-number">Kimlik Numarası</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">badge</span>
<input class="w-full bg-midnight-950 border border-slate-700 rounded-sm py-3 pl-10 pr-4 text-white placeholder:text-slate-600 focus:outline-none input-focus transition-all duration-300 uppercase tracking-wider" id="id-number" placeholder="Üyelik Kodunuz" required="" type="text"/>
</div>
</div>
<div>
<label class="block text-xs font-semibold text-slate-400 uppercase tracking-widest mb-2" for="access-key">Erişim Anahtarı</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 text-sm">key</span>
<input class="w-full bg-midnight-950 border border-slate-700 rounded-sm py-3 pl-10 pr-4 text-white placeholder:text-slate-600 focus:outline-none input-focus transition-all duration-300" id="access-key" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center group cursor-pointer">
<input class="w-4 h-4 rounded-sm border-slate-700 bg-midnight-950 text-brand focus:ring-brand focus:ring-offset-midnight-900 focus:ring-offset-2" type="checkbox"/>
<span class="ml-2 text-xs text-slate-400 group-hover:text-slate-300 transition-colors">Beni Hatırla</span>
</label>
<a class="text-xs text-brand hover:text-brand-dark transition-colors font-medium" href="#">Anahtarı mı Unuttun?</a>
</div>
<button class="w-full bg-brand hover:bg-brand-dark text-white font-bold py-3.5 rounded-sm transition-all duration-300 shadow-[0_4px_15px_rgba(0,153,255,0.3)] hover:shadow-[0_4px_25px_rgba(0,153,255,0.5)] active:scale-[0.98] uppercase tracking-widest flex items-center justify-center gap-2" id="submitBtn" type="submit">
<span>Giriş İzni İste</span>
<span class="material-symbols-outlined text-sm">login</span>
</button>
</form>
<div class="mt-6 text-center text-sm font-medium hidden" id="statusMessage"></div>
</div>
<div class="mt-8 text-center">
<p class="text-slate-500 text-xs">
                Hesabınız yok mu? <a class="text-brand hover:underline" href="#">Üyelik başvurusu yapın</a>
</p>
<div class="mt-8 flex justify-center gap-6">
<a class="text-slate-600 hover:text-brand transition-colors" href="#"><span class="material-symbols-outlined">share</span></a>
<a class="text-slate-600 hover:text-brand transition-colors" href="#"><span class="material-symbols-outlined">support_agent</span></a>
<a class="text-slate-600 hover:text-brand transition-colors" href="#"><span class="material-symbols-outlined">help_outline</span></a>
</div>
</div>
</div>
<!-- Auth Simulation Logic -->
<script>
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // UI state: Processing
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <span class="inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></span>
                <span class="ml-2">KİMLİK DOĞRULANIYOR...</span>
            `;
            statusMessage.classList.add('hidden');

            // Simulate server-side verification
            setTimeout(() => {
                const idValue = document.getElementById('id-number').value;
                
                // Demo logic: Accept any valid-looking ID
                if (idValue.length >= 4) {
                    statusMessage.textContent = "ERİŞİM ONAYLANDI. YÖNLENDİRİLİYORSUNUZ...";
                    statusMessage.className = "mt-6 text-center text-sm font-medium text-emerald-400 block";
                    submitBtn.classList.remove('bg-brand');
                    submitBtn.classList.add('bg-emerald-600');
                    submitBtn.innerHTML = `
                        <span class="material-symbols-outlined text-sm">check_circle</span>
                        <span class="ml-2">GİRİŞ BAŞARILI</span>
                    `;
                    
                    // Proceed to membership card
                    setTimeout(() => {
                        // Assuming the destination file exists in the deployment environment
                        window.location.href = 'mancavecard.html';
                    }, 1200);
                } else {
                    statusMessage.textContent = "HATA: GEÇERSİZ KİMLİK BİLGİSİ.";
                    statusMessage.className = "mt-6 text-center text-sm font-medium text-rose-500 block";
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `
                        <span>TEKRAR DENE</span>
                        <span class="material-symbols-outlined text-sm">refresh</span>
                    `;
                }
            }, 1800);
        });
    </script>
</body></html>
