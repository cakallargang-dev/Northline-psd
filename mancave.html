<script>
const EVENT_SHEET_ID = "1j6U0DlGw3OEhQj6zvrZl3SbIleZDbo4mVBIs4_pJgos";
const GVZ_URL = `https://docs.google.com/spreadsheets/d/${EVENT_SHEET_ID}/gviz/tq?tqx=out:json`;

async function fetchEvents() {
    const container = document.getElementById('events-container');

    if (!EVENT_SHEET_ID || EVENT_SHEET_ID.includes("BURAYA")) {
        renderDemoEvents(container);
        return;
    }

    try {
        const res = await fetch(GVZ_URL + "&t=" + Date.now());
        const text = await res.text();
        const jsonText = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1];
        const json = JSON.parse(jsonText);
        const rows = json.table.rows;

        if (!rows || rows.length === 0) {
            container.innerHTML = `
                <div class="bg-[#111827] p-8 text-center border border-[#1e2d42]">
                    <span class="material-symbols-outlined text-[#3b9eff] text-4xl mb-4">radar</span>
                    <h3 class="font-headline font-bold uppercase tracking-widest text-[#e8edf5]">RADAR TEMİZ</h3>
                    <p class="text-xs text-[#93b4d4] mt-2 font-body">Yakın zamanda planlanmış herhangi bir etkinlik bulunmuyor.</p>
                </div>
            `;
            return;
        }

        let html = '';
        for (let i = rows.length - 1; i >= 0; i--) {
            const cells = rows[i].c;
            const title = cells[1]?.v || "ÖZEL ETKİNLİK";
            const datetime = cells[2]?.f || cells[2]?.v || "ZAMAN BELİRLENECEK";
            const location = cells[3]?.v || "LOKASYON BELİRLENECEK";
            const details = cells[4]?.v || "Detaylar yalnızca onaylanmış üyelere etkinlik öncesinde aktarılacaktır.";
            let rawPhoto = cells[5]?.v || "";
            let mapsUrlRaw = cells[6]?.v || "";
            let mapsFinalUrl = mapsUrlRaw.startsWith("http") ? mapsUrlRaw : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}`;
            let imgUrl = "https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?auto=format&fit=crop&q=80&w=1200";
            if (rawPhoto && rawPhoto.startsWith("http")) {
                imgUrl = rawPhoto;
                const idMatch = rawPhoto.match(/[?&]id=([^&]+)/);
                if (idMatch) imgUrl = "https://drive.google.com/thumbnail?id=" + idMatch[1] + "&sz=w1200";
            }

            html += `
            <div class="relative w-full max-w-2xl mx-auto mb-16 group">
                <div class="absolute -inset-1 bg-gradient-to-br from-[#3b9eff]/10 to-transparent blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-1000"></div>
                <div class="relative bg-[#060d18] border border-[#1e2d42] overflow-hidden flex flex-col shadow-2xl">
                    <div class="relative h-64 sm:h-80 w-full overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#060d18] via-transparent to-transparent z-10"></div>
                        <img src="${imgUrl}" alt="Etkinlik" class="w-full h-full object-cover opacity-70 group-hover:scale-105 transition-transform duration-[2000ms] ease-out">
                        <div class="absolute top-6 left-6 z-20">
                            <span class="px-4 py-1.5 bg-[#0a0f1a]/90 backdrop-blur-md border border-[#3b9eff]/30 text-[#3b9eff] text-[8px] font-['Space_Grotesk'] uppercase tracking-[0.3em] font-bold">ÖZEL DAVETİYE</span>
                        </div>
                    </div>
                    <div class="p-8 sm:p-12 relative z-20 -mt-16 text-center">
                        <div class="inline-block px-5 py-2.5 bg-[#0a0f1a] border border-[#1e2d42] text-[#93b4d4] text-[10px] uppercase font-bold tracking-[0.3em] mb-8 shadow-xl">
                            ${datetime}
                        </div>
                        <h3 class="font-['Space_Grotesk'] text-3xl sm:text-4xl font-black uppercase tracking-tighter text-[#e8edf5] mb-6">${title}</h3>
                        <a href="${mapsFinalUrl}" target="_blank" class="inline-flex items-center justify-center gap-2 text-[#3b9eff] hover:text-[#93b4d4] transition-colors mb-8 cursor-pointer underline underline-offset-4 decoration-[#3b9eff]/40">
                            <span class="material-symbols-outlined text-sm">location_on</span>
                            <span class="text-xs font-['Space_Grotesk'] uppercase tracking-[0.2em] font-semibold">${location}</span>
                        </a>
                        <div class="h-px w-24 bg-gradient-to-r from-transparent via-[#1e2d42] to-transparent mx-auto mb-8"></div>
                        <p class="text-sm font-['Inter'] text-[#93b4d4]/80 leading-relaxed max-w-lg mx-auto whitespace-pre-line">${details}</p>
                    </div>
                    <div class="h-1 w-full flex">
                        <div class="h-full bg-[#3b9eff] w-1/4 transition-all duration-700 group-hover:w-full"></div>
                        <div class="h-full bg-[#111827] flex-1"></div>
                    </div>
                </div>
            </div>`;
        }
        container.innerHTML = html;

    } catch (e) {
        console.error("Etkinlikler yüklenemedi", e);
        renderDemoEvents(container);
    }
}

function renderDemoEvents(container) {
    container.innerHTML = `
    <div class="relative w-full max-w-2xl mx-auto mb-16 group">
        <div class="absolute -inset-1 bg-gradient-to-br from-[#3b9eff]/10 to-transparent blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-1000"></div>
        <div class="relative bg-[#060d18] border border-[#1e2d42] overflow-hidden flex flex-col shadow-2xl">
            <div class="relative h-64 sm:h-80 w-full overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-t from-[#060d18] via-[#060d18]/20 to-transparent z-10"></div>
                <img src="https://images.unsplash.com/photo-1542282088-72c9c2d8ed96?auto=format&fit=crop&q=80&w=1200" alt="Etkinlik" class="w-full h-full object-cover opacity-70 group-hover:scale-105 transition-transform duration-[2000ms] ease-out">
                <div class="absolute top-6 left-6 z-20">
                    <span class="px-4 py-1.5 bg-[#0a0f1a]/90 backdrop-blur-md border border-[#3b9eff]/30 text-[#3b9eff] text-[8px] font-['Space_Grotesk'] uppercase tracking-[0.3em] font-bold">ÖZEL DAVETİYE</span>
                </div>
            </div>
            <div class="p-8 sm:p-12 relative z-20 -mt-20 text-center">
                <div class="inline-block px-5 py-2.5 bg-[#0a0f1a] border border-[#1e2d42] text-[#93b4d4] text-[10px] uppercase font-bold tracking-[0.3em] mb-8 shadow-xl">
                    CUMARTESİ GECESİ — 23:00
                </div>
                <h3 class="font-['Space_Grotesk'] text-3xl sm:text-5xl font-black uppercase tracking-tighter text-[#e8edf5] mb-6 text-balance">BOĞAZ GECE SÜRÜŞÜ</h3>
                <a href="https://www.google.com/maps/search/?api=1&query=Maslak+Oto+Sanayi" target="_blank" class="inline-flex items-center justify-center gap-2 text-[#3b9eff] hover:text-[#93b4d4] transition-colors mb-8 cursor-pointer underline underline-offset-4 decoration-[#3b9eff]/40">
                    <span class="material-symbols-outlined text-sm">location_on</span>
                    <span class="text-xs font-['Space_Grotesk'] uppercase tracking-[0.2em] font-semibold">MASLAK BULUŞMA NOKTASI — LOKASYON GİZLİ</span>
                </a>
                <div class="h-px w-24 bg-gradient-to-r from-transparent via-[#1e2d42] to-transparent mx-auto mb-8"></div>
                <p class="text-sm font-['Inter'] text-[#93b4d4]/80 leading-relaxed max-w-lg mx-auto text-balance">
                    Araçların modifiye durumlarını gözden geçireceğiz ve Boğaz hattında kontrollü gece sürüşü yapacağız. Yalnızca onaylanmış üyeler ve kayıtlı araçlar katılabilir.
                </p>
            </div>
            <div class="h-1 w-full flex">
                <div class="h-full bg-[#3b9eff] w-1/4 transition-all duration-700 group-hover:w-full"></div>
                <div class="h-full bg-[#111827] flex-1"></div>
            </div>
        </div>
    </div>`;
}

document.addEventListener("DOMContentLoaded", () => {
    const userStr = localStorage.getItem('mancave_user');
    if (!userStr) {
        window.location.href = 'mancavecard.html';
        return;
    }
    fetchEvents();
});
</script>
