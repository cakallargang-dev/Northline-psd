</a>

<script>
// --- GOOGLE SHEETS AYARLARI ---
// Google form'un bağlı olduğu Etkinlik Sheets ID'sini buraya yapıştırın
const EVENT_SHEET_ID = "1j6U0DlGw3OEhQj6zvrZl3SbIleZDbo4mVBIs4_pJgos"; 

// Eğer Form yanıtları Sheet içindeki 2. sekmedeyse (GID), o zaman URL sonuna '&gid=xxxx' eklemek gerekebilir.
// Şimdilik sadece tqx=out:json kullanarak ilk tab'ı çekiyoruz.
const GVZ_URL = `https://docs.google.com/spreadsheets/d/${EVENT_SHEET_ID}/gviz/tq?tqx=out:json`;

async function fetchEvents() {
    const container = document.getElementById('events-container');

    // Eğer ID değiştirilmemişse (Henüz Google Form kurulmamışsa) DEMO veriler ile sayfayı süsle
    if (!EVENT_SHEET_ID || EVENT_SHEET_ID.includes("BURAYA")) {
        renderDemoEvents(container);
        return;
    }

    try {
        const res = await fetch(GVZ_URL + "&t=" + Date.now());
        const text = await res.text();
        
        // Strip out Google's JSON callback wrapper
        const jsonText = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1];
        const json = JSON.parse(jsonText);
        
        const rows = json.table.rows;
        
        if (!rows || rows.length === 0) {
            container.innerHTML = `
                <div class="bg-surface-container-low p-8 text-center border border-outline-variant/20">
                    <span class="material-symbols-outlined text-[#ff2a2a] text-4xl mb-4">radar</span>
                    <h3 class="font-headline font-bold uppercase tracking-widest text-on-surface">RADAR TEMİZ</h3>
                    <p class="text-xs text-on-surface-variant mt-2 font-body">Yakın zamanda planlanmış herhangi bir görev bulunmuyor.</p>
                </div>
            `;
            return;
        }

        // Form'daki Sütun Ornegi: 
        // 0: Timestamp
        // 1: Başlık
        // 2: Tarih / Saat
        // 3: Konum
        // 4: Detaylar
        // 5: Fotoğraf Linki (Opsiyonel)
        let html = '';
        
        // En son eklenen en üstte olmak üzere ters çeviriyoruz
        for (let i = rows.length - 1; i >= 0; i--) {
            const cells = rows[i].c;
            const title = cells[1]?.v || "GİZLİ TOPLANTI";
            const datetime = cells[2]?.f || cells[2]?.v || "ZAMAN BİLİNMİYOR"; 
            const location = cells[3]?.v || "GİZLİ LOKASYON";
            const details = cells[4]?.v || "Detaylar sadece onaylanmış üyelere toplantı esnasında aktarılacaktır.";
            
            let rawPhoto = cells[5]?.v || "";
            let mapsUrlRaw = cells[6]?.v || ""; 
            
            // Konum linki oluştur (Kendi yazdıysa onu, yoksa google maps araması)
            let mapsFinalUrl = mapsUrlRaw.startsWith("http") ? mapsUrlRaw : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}`;

            let imgUrl = "https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?auto=format&fit=crop&q=80&w=1200"; // Lüks koyu varsayılan görsel
            
            if (rawPhoto && rawPhoto.startsWith("http")) {
                imgUrl = rawPhoto;
                // Google Drive uc?id düzeltmesi
                const idMatch = rawPhoto.match(/[?&]id=([^&]+)/);
                if (idMatch) {
                    imgUrl = "https://drive.google.com/thumbnail?id=" + idMatch[1] + "&sz=w1200";
                }
            }

            html += `
            <div class="relative w-full max-w-2xl mx-auto mb-16 group">
                <!-- Glow effect background -->
                <div class="absolute -inset-1 bg-gradient-to-br from-[#ff2a2a]/10 to-transparent blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-1000"></div>
                
                <div class="relative bg-[#0e0e0e] border border-[#2a2a2a] overflow-hidden flex flex-col shadow-2xl">
                    <!-- Photo Section -->
                    <div class="relative h-64 sm:h-80 w-full overflow-hidden">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#0e0e0e] via-transparent to-transparent z-10 w-full h-full"></div>
                        <img src="${imgUrl}" alt="Event Background" class="w-full h-full object-cover opacity-70 group-hover:scale-105 transition-transform duration-[2000ms] ease-out">
                        <div class="absolute top-6 left-6 z-20">
                            <span class="px-4 py-1.5 bg-[#131313]/90 backdrop-blur-md border border-[#ff2a2a]/30 text-[#ff2a2a] text-[8px] font-['Space_Grotesk'] uppercase tracking-[0.3em] font-bold">RESMİ DAVETİYE</span>
                        </div>
                    </div>

                    <!-- Content Section -->
                    <div class="p-8 sm:p-12 relative z-20 -mt-16 text-center">
                        <div class="inline-block px-5 py-2.5 bg-[#131313] border border-[#2a2a2a] text-[#e8bcb7] text-[10px] uppercase font-bold tracking-[0.3em] mb-8 shadow-xl">
                            ${datetime}
                        </div>
                        
                        <h3 class="font-['Space_Grotesk'] text-3xl sm:text-4xl font-black uppercase tracking-tighter text-[#e5e2e1] mb-6 drop-shadow-lg">${title}</h3>
                        
                        <a href="${mapsFinalUrl}" target="_blank" class="inline-flex items-center justify-center gap-2 text-[#ff2a2a] hover:text-[#e8bcb7] transition-colors mb-8 cursor-pointer underline underline-offset-4 decoration-[#ff2a2a]/40 hover:decoration-[#e8bcb7]">
                            <span class="material-symbols-outlined text-sm">location_on</span>
                            <span class="text-xs font-['Space_Grotesk'] uppercase tracking-[0.2em] font-semibold">${location}</span>
                        </a>

                        <div class="h-px w-24 bg-gradient-to-r from-transparent via-[#2a2a2a] to-transparent mx-auto mb-8"></div>
                        
                        <p class="text-sm font-['Inter'] text-[rgba(232,188,183,0.7)] leading-relaxed max-w-lg mx-auto whitespace-pre-line">
                            ${details}
                        </p>
                    </div>
                    
                    <!-- Bottom ornamental detail -->
                    <div class="h-1 w-full flex">
                        <div class="h-full bg-[#ff2a2a] w-1/4 transition-all duration-700 group-hover:w-full"></div>
                        <div class="h-full bg-[#1c1b1b] flex-1"></div>
                    </div>
                </div>
            </div>
            `;
        }

        container.innerHTML = html;

    } catch (e) {
        console.error("Etkinlikler yüklenemedi", e);
        container.innerHTML = `
            <div class="bg-surface-container-low p-6 text-center border-l-2 border-[#ff2a2a]">
                <span class="material-symbols-outlined text-[#ff2a2a] text-3xl mb-2 block">warning</span>
                <p class="text-sm font-body text-[#ff2a2a] uppercase tracking-widest">Veri senkronizasyonu başarısız</p>
                <p class="text-[10px] text-on-surface-variant mt-2 hidden" id="err-msg">${e.message}</p>
            </div>
        `;
    }
}

// Gecici DEMO Veriler (Kullanici SHEET_ID girene kadar tasarimi test edebilsin diye)
function renderDemoEvents(container) {
    const demoHtml = `
    <!-- Etkinlik 1 (Lüks Davetiye Tasarımı) -->
    <div class="relative w-full max-w-2xl mx-auto mb-16 group">
        <div class="absolute -inset-1 bg-gradient-to-br from-[#ff2a2a]/10 to-transparent blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-1000"></div>
        <div class="relative bg-[#0e0e0e] border border-[#2a2a2a] overflow-hidden flex flex-col shadow-2xl">
            <!-- Photo Section -->
            <div class="relative h-64 sm:h-80 w-full overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-t from-[#0e0e0e] via-[#0e0e0e]/20 to-transparent z-10 w-full h-full"></div>
                <img src="https://images.unsplash.com/photo-1542282088-72c9c2d8ed96?auto=format&fit=crop&q=80&w=1200" alt="Event Background" class="w-full h-full object-cover opacity-80 group-hover:scale-105 transition-transform duration-[2000ms] ease-out">
                <div class="absolute top-6 left-6 z-20">
                    <span class="px-4 py-1.5 bg-[#131313]/90 backdrop-blur-md border border-[#ff2a2a]/30 text-[#ff2a2a] text-[8px] font-['Space_Grotesk'] uppercase tracking-[0.3em] font-bold">RESMİ DAVETİYE</span>
                </div>
            </div>

            <!-- Content Section -->
            <div class="p-8 sm:p-12 relative z-20 -mt-20 text-center">
                <div class="inline-block px-5 py-2.5 bg-[#131313] border border-[#2a2a2a] text-[#e8bcb7] text-[10px] uppercase font-bold tracking-[0.3em] mb-8 shadow-xl">
                    CUMARTESİ GECE YARISI, 23:00 - 02:00
                </div>
                
                <h3 class="font-['Space_Grotesk'] text-3xl sm:text-5xl font-black uppercase tracking-tighter text-[#e5e2e1] mb-6 drop-shadow-xl text-balance">MASLAK UNDERGROUND RUN</h3>
                
                <a href="https://www.google.com/maps/search/?api=1&query=Maslak+Oto+Sanayi" target="_blank" class="inline-flex items-center justify-center gap-2 text-[#ff2a2a] hover:text-[#e8bcb7] transition-colors mb-8 cursor-pointer underline underline-offset-4 decoration-[#ff2a2a]/40 hover:decoration-[#e8bcb7]">
                    <span class="material-symbols-outlined text-sm">location_on</span>
                    <span class="text-xs font-['Space_Grotesk'] uppercase tracking-[0.2em] font-semibold">MASLAK OTO SANAYİ - GARAJ A (LOKASYON GİZLİ)</span>
                </a>

                <div class="h-px w-24 bg-gradient-to-r from-transparent via-[#2a2a2a] to-transparent mx-auto mb-8"></div>
                
                <p class="text-sm font-['Inter'] text-[rgba(232,188,183,0.7)] leading-relaxed max-w-lg mx-auto text-balance">
                    Araçların modifiye durumlarını gözden geçireceğiz ve sanayi bölgesinde test çıkışı yapacağız. Yalnızca onaylanmış üyeler ve kayıtlı araçlar katılabilir. Yüksek desibel uyarısı sebebiyle yerel güvenlik protokollerine uyulması rica olunur.
                </p>
            </div>
            
            <div class="h-1 w-full flex">
                <div class="h-full bg-[#ff2a2a] w-1/4 transition-all duration-700 group-hover:w-full"></div>
                <div class="h-full bg-[#1c1b1b] flex-1"></div>
            </div>
        </div>
    </div>
    `;
    container.innerHTML = demoHtml;
}

// Sayfa yüklendiğinde veriyi çek
document.addEventListener("DOMContentLoaded", () => {
    // GÜVENLİK KORİDORU: Giriş yapmamışsa Login'e at!
    const userStr = localStorage.getItem('mancave_user');
    if (!userStr) {
        window.location.href = 'mancavecard.html';
        return;
    }
    
    fetchEvents();
});
</script>
